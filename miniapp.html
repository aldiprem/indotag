<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0088cc">
    <title>Indotag Mini App | Marketplace Username</title>
    <link rel="stylesheet" href="/css/miniapp.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loader"></div>
            <p>Memuat Indotag Mini App...</p>
        </div>

        <!-- Main Content -->
        <div id="main-content" style="display: none;">
            <!-- Header -->
            <header class="main-header">
                <div class="header-container">
                    <div class="logo">
                        <i class="fab fa-telegram"></i>
                        <span>Indotag</span>
                    </div>
                    <div class="user-badge" id="userBadge">
                        <img src="" alt="" id="userAvatar" class="user-avatar-small" style="display: none;">
                        <span id="userName"></span>
                    </div>
                </div>
            </header>

            <!-- Scroll Container -->
            <div class="scroll-container" id="scrollContainer">
                <!-- Welcome Banner -->
                <div class="welcome-banner" id="welcomeBanner">
                    <h2>Welcome to Indotag!</h2>
                    <p>Marketplace username terpercaya untuk Telegram</p>
                </div>

                <!-- Marketplace Section -->
                <div class="marketplace-section">
                    <div class="section-header">
                        <h2><i class="fas fa-store"></i> Marketplace</h2>
                        <div class="filters">
                            <select id="platformFilter" class="filter-chip">
                                <option value="all">Semua</option>
                                <option value="telegram">Telegram</option>
                                <option value="instagram">Instagram</option>
                                <option value="twitter">Twitter</option>
                                <option value="tiktok">TikTok</option>
                            </select>
                            <button id="sortBtn" class="filter-chip">
                                <i class="fas fa-sort"></i> Terbaru
                            </button>
                        </div>
                    </div>
                    
                    <div class="marketplace-grid" id="marketplaceGrid">
                        <div class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Memuat username...</p>
                        </div>
                    </div>
                </div>

                <!-- Sell Section (for logged in users) -->
                <div class="sell-section" id="sellSection" style="display: none;">
                    <div class="section-header">
                        <h2><i class="fas fa-plus-circle"></i> Jual Username</h2>
                    </div>
                    <div class="sell-form">
                        <input type="text" id="sellUsername" placeholder="Username (contoh: @username)" class="form-input">
                        <select id="sellPlatform" class="form-input">
                            <option value="telegram">Telegram</option>
                            <option value="instagram">Instagram</option>
                            <option value="twitter">Twitter/X</option>
                            <option value="tiktok">TikTok</option>
                        </select>
                        <input type="number" id="sellPrice" placeholder="Harga (Rp)" class="form-input">
                        <textarea id="sellDescription" placeholder="Deskripsi (opsional)" class="form-input" rows="2"></textarea>
                        <button id="submitListingBtn" class="btn btn-primary btn-block">
                            <i class="fas fa-paper-plane"></i> Listing Username
                        </button>
                    </div>
                </div>

                <!-- Info Section -->
                <div class="info-section">
                    <div class="info-card">
                        <i class="fas fa-shield-alt"></i>
                        <h3>Aman & Terpercaya</h3>
                        <p>Sistem escrow menjamin keamanan transaksi</p>
                    </div>
                    <div class="info-card">
                        <i class="fas fa-bolt"></i>
                        <h3>Proses Cepat</h3>
                        <p>Transaksi instan dengan sistem otomatis</p>
                    </div>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-tab="marketplace">
                    <i class="fas fa-store"></i>
                    <span>Marketplace</span>
                </button>
                <button class="nav-item" data-tab="sell">
                    <i class="fas fa-plus-circle"></i>
                    <span>Jual</span>
                </button>
                <button class="nav-item" data-tab="profile">
                    <i class="fas fa-user"></i>
                    <span>Profil</span>
                </button>
            </nav>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast" style="display: none;"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/miniapp.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IndoTag MiniApp</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* MiniApp specific styles */
        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 0;
        }
        
        .miniapp-container {
            max-width: 100%;
            padding: 20px;
        }
        
        .user-profile {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            object-fit: cover;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .user-username {
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 15px;
        }
        
        .logout-btn {
            background: var(--tg-theme-destructive-text-color, #ff3b30);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="miniapp-container">
        <div id="userProfile" class="user-profile">
            <div class="loading-spinner"></div>
        </div>
        
        <div class="features">
            <h2>Welcome to IndoTag MiniApp</h2>
            <p>Nikmati pengalaman terbaik melalui Telegram MiniApp kami</p>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>

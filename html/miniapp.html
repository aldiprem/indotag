<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IndoTag MiniApp</title>
    <link rel="stylesheet" href="/css/miniapp.css">
    <style>
        /* Fallback style */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }
        .loading-fallback {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="miniapp-container">
        <!-- Header -->
        <div class="miniapp-header">
            <div class="header-content">
                <h1 class="app-title">IndoTag</h1>
                <p class="app-subtitle">Platform Digital Terpercaya</p>
            </div>
        </div>

        <!-- User Profile Section -->
        <div class="user-section" id="userSection">
            <div class="loading-wrapper">
                <div class="loading-spinner"></div>
                <p>Memuat profil...</p>
            </div>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
            <div class="menu-card" onclick="showFeature('marketplace')">
                <div class="menu-icon">🛍️</div>
                <h3>Marketplace</h3>
                <p>Temukan produk terbaik</p>
            </div>
            <div class="menu-card" onclick="showFeature('pricing')">
                <div class="menu-icon">💰</div>
                <h3>Pricing</h3>
                <p>Paket spesial untuk Anda</p>
            </div>
            <div class="menu-card" onclick="showFeature('profile')">
                <div class="menu-icon">👤</div>
                <h3>Profil</h3>
                <p>Kelola akun Anda</p>
            </div>
            <div class="menu-card" onclick="showFeature('support')">
                <div class="menu-icon">💬</div>
                <h3>Bantuan</h3>
                <p>Pusat bantuan</p>
            </div>
        </div>

        <!-- Featured Products -->
        <div class="featured-section">
            <h2 class="section-title">Produk Unggulan</h2>
            <div class="products-list" id="productsList">
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigateTo('home')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Beranda</span>
            </div>
            <div class="nav-item" onclick="navigateTo('shop')">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">Toko</span>
            </div>
            <div class="nav-item" onclick="navigateTo('orders')">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Pesanan</span>
            </div>
            <div class="nav-item" onclick="navigateTo('profile')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Saya</span>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/miniapp.js"></script>
</body>
</html>
